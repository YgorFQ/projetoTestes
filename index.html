<!DOCTYPE html>
<!--
  index.html - shell principal do SenkoLib

  RESPONSABILIDADE:
  - Montar somente cabecalho, tema e raiz neutra das features.
  - Carregar um register.js por feature disponivel.
  - Nao conhecer grids, modais, dados ou integracoes internas.

  Cada register.js controla a view, os estilos, os dados e a inicializacao da
  sua propria feature. O Preview continua em app/prototype enquanto for beta.
-->
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenkoLib</title>
  <script>(function(){try{var t=localStorage.getItem('senkolib_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <script>
    /*
     * O antigo Service Worker adicionava cache a um projeto que muda muito
     * durante o desenvolvimento. Alem de atrasar os recursos, uma aba podia
     * continuar executando registers antigos. Esta limpeza aposenta o worker
     * e recarrega uma unica vez quando ele ainda controlava a pagina.
     */
    (function retireLegacyServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      var appBaseUrl = new URL('./', document.baseURI).href;

      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        return Promise.all(registrations.filter(function (registration) {
          return registration.scope === appBaseUrl;
        }).map(function (registration) {
          return registration.unregister();
        }));
      }).then(function () {
        if (!navigator.serviceWorker.controller) return;
        if (sessionStorage.getItem('senkolib_sw_retired')) return;
        sessionStorage.setItem('senkolib_sw_retired', '1');
        window.location.reload();
      });

      if ('caches' in window) {
        caches.keys().then(function (keys) {
          keys.filter(function (key) {
            return key.indexOf('senkolib-') === 0;
          }).forEach(function (key) {
            caches.delete(key);
          });
        });
      }
    })();
  </script>
  <link rel="stylesheet" href="app/shared/styles/senko-tokens.css" />
  <link rel="stylesheet" href="app/shared/styles/senko-components.css" />
  <link rel="stylesheet" href="app/shell/styles/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="app/shared/assets/senko.ico" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo" id="logoHome" style="cursor:pointer;" title="Ir para a primeira feature">
        <img src="app/shared/assets/senko.png" class="logo-img" alt="SenkoLib" />
        <span class="logo-text">Senko<strong>Lib</strong></span>
      </div>
      <div class="header-actions">
        <!-- Controle global do shell: continua visivel mesmo se qualquer feature for removida. -->
        <button class="theme-toggle" id="themeToggleBtn" title="Tema escuro">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Raiz neutra das features. Cada feature monta sua propria tela aqui, sem depender da Biblioteca. -->
  <div id="senkoFeatureRoot"></div>

  <script src="app/shell/scripts/senko-shell.js?v=20260613-feature-query"></script>
  <script src="app/features/biblioteca/register.js?v=20260614-local-file"></script>
  <script src="app/features/colecoes/register.js?v=20260614-local-file"></script>

  <script src="app/features/imagens/scripts/register.js?v=20260613-direct-view"></script>
  <script src="app/features/sources/scripts/register.js?v=20260613-base-mode-visibility"></script>
  <script src="app/prototype/gamer-preview/register.js?v=20260613-direct-view"></script>
  <script>
  (function () {
    var KEY = 'senkolib_theme';
    var SUN  = '<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>';
    var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

    function currentTheme() {
      try {
        return localStorage.getItem(KEY) || 'light';
      } catch (error) {
        return 'light';
      }
    }

    function apply(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      var icon = document.getElementById('themeIcon');
      var btn  = document.getElementById('themeToggleBtn');
      if (icon) icon.innerHTML = theme === 'dark' ? SUN : MOON;
      if (btn) btn.title = theme === 'dark' ? 'Tema claro' : 'Tema escuro';
    }

    apply(currentTheme());

    document.addEventListener('DOMContentLoaded', function () {
      apply(currentTheme());
      document.getElementById('themeToggleBtn').addEventListener('click', function () {
        var next = (document.documentElement.getAttribute('data-theme') || 'light') === 'dark' ? 'light' : 'dark';
        localStorage.setItem(KEY, next);
        apply(next);
      });
    });
  })();
  </script>
</body>

</html>
